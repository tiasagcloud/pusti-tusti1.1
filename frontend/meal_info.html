<!DOCTYPE html>
<html>
<head>
    <title>Meals</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <h1>Meal Records</h1>

    <div class="card">
        <table border="1" width="100%" id="mealTable">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Class</th>
                <th>Date</th>
                <th>QR</th>
                <th>Face</th>
            </tr>
        </table>

        <br>
        <button onclick="go('home.html')">Home</button>
    </div>

</div>

<script src="script.js"></script>
<script>
fetch("http://127.0.0.1:5000/get_meals")
.then(res => res.json())
.then(data => {
    let table = document.getElementById("mealTable");

    data.forEach(m => {
        table.innerHTML += `
        <tr>
            <td>${m.id}</td>
            <td>${m.name}</td>
            <td>${m.class}</td>
            <td>${m.date}</td>
            <td>${m.qr}</td>
            <td>${m.face}</td>
        </tr>`;
    });
});
</script>

</body>
</html>
